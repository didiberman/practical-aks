apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-service-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: "{{ .Values.appIdentityClientId }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-learning-app
  namespace: default
  labels:
    app: aks-learning-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aks-learning-app
  template:
    metadata:
      labels:
        app: aks-learning-app
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: llm-service-sa
      containers:
      - name: web-app
        image: "{{ if .Values.acrLoginServer }}{{ .Values.acrLoginServer }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
        
        # Environment variables for Azure OpenAI configuration
        env:
        - name: AZURE_OPENAI_ENDPOINT
          value: "{{ .Values.azureOpenAI.endpoint }}"
        - name: AZURE_OPENAI_DEPLOYMENT
          value: "{{ .Values.azureOpenAI.deployment }}"
        - name: AZURE_OPENAI_API_VERSION
          value: "{{ .Values.azureOpenAI.apiVersion }}"
        
        # Security Context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

        # Health monitoring
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

        # Resource bounds
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
